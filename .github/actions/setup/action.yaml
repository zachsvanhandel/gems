name: setup

inputs:
  node-version:
    required: true

runs:
  using: composite
  steps:
    - name: pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10
        run_install: false

    - name: node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: install
      shell: bash
      run: pnpm install --frozen-lockfile
