name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: build

    strategy:
      matrix:
        node-version: [24]

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            next-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: build
        run: pnpm build

  lint:
    name: lint

    strategy:
      matrix:
        node-version: [24]

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: lint
        run: pnpm lint
